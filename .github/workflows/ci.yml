name: CI
on: [push]
jobs:
  tf:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: infra } }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.7.5" }
      - run: terraform init -backend=false
      - run: terraform validate
